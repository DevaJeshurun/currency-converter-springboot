<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>Conversion Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-card: #1a1d27;
            --bg-input: #12141c;
            --border: #2a2d3a;
            --text-primary: #f0ece4;
            --text-secondary: #7a7f8e;
            --accent: #c9a96e;
            --accent-dim: rgba(201, 169, 110, 0.12);
            --accent-glow: rgba(201, 169, 110, 0.25);
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: #c9a96e;
            top: -120px; left: -150px;
        }
        body::after {
            width: 450px; height: 450px;
            background: #4a6fa5;
            bottom: -100px; right: -130px;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            text-align: center;
            animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 64px; height: 64px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: var(--accent-dim);
            border: 1px solid var(--accent-glow);
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            animation: iconPop 0.55s 0.18s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }
        .icon-wrap svg {
            width: 28px; height: 28px;
            stroke: var(--accent); fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .icon-wrap svg .check-path {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.4s 0.45s ease forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 1.6rem;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.45s 0.3s ease both;
        }

        .result-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px 20px;
            margin: 0 auto 30px;
            opacity: 0;
            animation: fadeUp 0.5s 0.4s cubic-bezier(0.16,1,0.3,1) both;
        }
        .result-label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .result-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.02em;
            word-break: break-word;
        }

        .divider {
            width: 40px; height: 1px;
            background: var(--border);
            margin: 0 auto 28px;
            opacity: 0;
            animation: fadeUp 0.4s 0.5s ease both;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            transition: color 0.2s, gap 0.2s;
            opacity: 0;
            animation: fadeUp 0.45s 0.55s ease both;
        }
        .back-link:hover {
            color: var(--accent);
            gap: 12px;
        }
        .back-link svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.2s;
        }
        .back-link:hover svg {
            transform: translateX(-2px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">

    <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
            <path class="check-path" d="M5 13l4 4L19 7"/>
        </svg>
    </div>

    <h1>Conversion Result</h1>

    <div class="result-box">
        <div class="result-label">Converted Amount</div>
        <div class="result-value" th:text="${result}"></div>
    </div>

    <div class="divider"></div>

    <a href="/" class="back-link">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Convert Again
    </a>
</div>

</body>
</html>
